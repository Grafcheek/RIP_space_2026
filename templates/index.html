<html lang="ru">
    <head>
        <title>Межпланетные маршруты — каталог</title>
        <link rel="stylesheet" href="/static/css/styles.css">
    </head>
    <body>
        <header class="site-header site-header-main">
            <form action="/" method="GET" class="search-form header-search">
                <input
                    type="text"
                    name="query"
                    class="search-input"
                    placeholder="Поиск маршрутов и планет"
                    value="{{ .query }}">
            </form>
            <a href="/" class="header-home header-logo-center">
                <img src="/static/img/logo.png" alt="Voyager mission" class="header-home__icon">
            </a>
            <div class="header-mission">
                {{ if .hasDraft }}
                <a href="/missions/{{ .draftID }}" class="calc-button">
                    <span class="calc-button__label">Расчёты</span>
                    <span class="calc-button__badge">{{ .draftSize }}</span>
                    <svg class="calc-button__icon" xmlns="http://www.w3.org/2000/svg" width="16" height="17" viewBox="0 0 16 17" fill="none">
                        <g>
                            <g>
                                <path d="M8 16.5c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm0-15c-3.9 0-7 3.1-7 7 0 3.9 3.1 7 7 7s7-3.1 7-7c0-3.9-3.1-7-7-7z" />
                            </g>
                            <g>
                                <path d="M8 10l2.6-2.6.6.6L8 11.2 4.8 8l.6-.6L8 10z" />
                            </g>
                        </g>
                    </svg>
                </a>
                {{ end }}
            </div>
        </header>
        <div class="space">
            <div class="container">
                {{ range .routes }}
                <a href="/routes/{{ .ID }}" class="card">
                    <img src="http://localhost:9000/spaceobjects/{{ .Image }}" alt="{{ .Title }}">
                    <div class="card__body">
                        <div class="card__title-row">
                            <h2 class="card__title">{{ .Title }}</h2>
                            <span class="card__icon" aria-hidden="true">
                                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle class="color-nasa-red" cx="16" cy="16" r="16"></circle>
                                    <path d="M8 16.956h12.604l-3.844 4.106 1.252 1.338L24 16l-5.988-6.4-1.252 1.338 3.844 4.106H8v1.912z" class="color-spacesuit-white"></path>
                                </svg>
                            </span>
                        </div>
                    </div>
                </a>
                {{ end }}
            </div>
        </div>
    </body>
</html>
